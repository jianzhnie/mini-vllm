name: Code Quality

on:
  push:
    branches: [main, develop]
    paths:
      - "minivllm/**/*.py"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"
  pull_request:
    branches: [main, develop]
    paths:
      - "minivllm/**/*.py"
      - "pyproject.toml"
      - ".pre-commit-config.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy types-PyYAML types-tqdm

      - name: Run Black
        run: black --check --diff minivllm/

      - name: Run Ruff
        run: ruff check minivllm/

      - name: Run Ruff Format Check
        run: ruff format --check minivllm/

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-PyYAML types-tqdm
          # Install minimal runtime dependencies for mypy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers numpy tqdm safetensors colorama xxhash
          pip install -e . --no-deps

      - name: Run MyPy
        run: mypy minivllm/ --ignore-missing-imports --show-error-codes

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run Bandit Security Scan
        run: bandit -r minivllm/ -f json -o bandit-report.json || true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
